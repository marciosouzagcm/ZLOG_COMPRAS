# Nome da aplicação Spring Boot.
spring.application.name=zlog_compras

# Configurações de Log
logging.level.root=INFO

# Pacote da sua aplicação: TRACE para ver os logs do JwtAuthenticationFilter.
logging.level.com.zlogcompras=TRACE

# Níveis detalhados para o Spring Security, incluindo filtros, autenticação e autorização.
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.web=TRACE
logging.level.org.springframework.security.authentication=TRACE

# Logs para requisições web e processamento de métodos (HTTP requests e responses).
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
logging.level.org.springframework.web.servlet.mvc.method.annotation.HttpEntityMethodProcessor=TRACE

# Logs para JPA/Hibernate e camadas de dados.
logging.level.org.springframework.dao=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.data.jpa=DEBUG
# Mostra o SQL gerado pelo Hibernate
logging.level.org.hibernate.SQL=DEBUG
# Mostra os parâmetros bindados nas queries SQL
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Local para o arquivo de log.
logging.file.name=logs/zlog_compras.log

# Configurações do Banco de Dados TiDB Cloud (Nuvem)
# ALTERADO: Apontando para o schema isolado zlog_compras_db para evitar conflito com tabelas nativas do sistema no schema test
spring.datasource.url=jdbc:mysql://gateway01.us-east-1.prod.aws.tidbcloud.com:4000/zlog_compras_db?sslMode=VERIFY_IDENTITY&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=TRUE&useUnicode=true&characterEncoding=UTF-8&pinGlobalTxToPhysicalConnection=true&maintainTimeStats=false&elideSetAutoCommits=true
spring.datasource.username=2ekNitjymau1dcX.root
spring.datasource.password=z5CXAAvr36nHyw79
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do HikariCP (Pool de conexões otimizado para Banco Distribuído na Nuvem)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# Configurações do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilita o Open-In-View para evitar warnings e problemas de desempenho.
spring.jpa.open-in-view=false

# Configurações do Flyway Migration (Otimizadas e Isoladas para TiDB Cloud)
spring.flyway.enabled=true

# Mantém desativado o automatic baseline para EVITAR o erro de 'CREATE TABLE ... SELECT' incompatível no TiDB
spring.flyway.baseline-on-migrate=false

# AJUSTE PARA SCHEMA NÃO-VAZIO: Ignora tabelas existentes e força a criação da tabela de histórico de forma segura
spring.flyway.validate-migration-naming=true
spring.flyway.baseline-version=0
spring.flyway.ignore-missing-migrations=true

# Mantém desativado os named locks proprietários do MySQL que conflitam com o TiDB
spring.flyway.plugins.mysql.lock=false
spring.flyway.plugins.mysql.named-lock=false
spring.flyway.lock-strategy=none

# Força o isolamento da transação para evitar concorrência de conexões
spring.flyway.execute-in-transaction=false
spring.flyway.properties.flyway.isolated=true

# Parâmetros adicionais para estabilizar o canal de comunicação JDBC no banco distribuído
spring.flyway.jdbc-properties.useLocalSessionState=true
spring.flyway.jdbc-properties.elideSetAutoCommits=true

# Configuração de resiliência e tentativas de reconexão automática caso o nó sofra oscilações
spring.flyway.connect-retries=15
spring.flyway.connect-retries-interval=5

# Configurações do JWT Service
jwt.secret.key=9U8kJkho/6JrxbCy9CqCiApqZCYyPNUO3UaR1KcBHr0=

# Tempo de expiração do JWT em milissegundos (24 horas)
jwt.expiration.millis=86400000

spring.flyway.repair-on-migrate=true

spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=true